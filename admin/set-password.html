<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear contraseña</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body class="auth-body">

<div class="auth-card">
  <div class="auth-mark"><span class="auth-dot"></span> ADMIN</div>
  <h1 id="pageTitle">Crear tu contraseña</h1>
  <p class="auth-sub" id="authSub">Validando tu enlace…</p>

  <form id="pwForm" class="auth-form" hidden>
    <label for="password">Nueva contraseña</label>
    <input type="password" id="password" required minlength="8" autocomplete="new-password" placeholder="Mínimo 8 caracteres">
    <label for="password2">Repite la contraseña</label>
    <input type="password" id="password2" required minlength="8" autocomplete="new-password" placeholder="Mínimo 8 caracteres">
    <button type="submit" class="btn-primary" id="pwBtn">Guardar y entrar</button>
    <div class="auth-msg" id="pwMsg"></div>
  </form>

  <div id="invalidState" class="auth-state" hidden>
    <p>Este enlace ya se usó o ya no es válido.</p>
    <a class="link-btn" href="login.html">Ir a iniciar sesión</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../config.js"></script>
<script src="../shared/supabase-client.js"></script>
<script>
(function () {
  const authSub  = document.getElementById('authSub');
  const pwForm   = document.getElementById('pwForm');
  const invalid  = document.getElementById('invalidState');
  const pwMsg    = document.getElementById('pwMsg');

  // The Supabase client auto-detects the access_token in the URL hash
  // (from the invite/reset email link) and turns it into a session.
  // Give it a tick, then check.
  setTimeout(async () => {
    const { data } = await window.db.auth.getSession();
    if (data && data.session) {
      authSub.textContent = 'Elige una contraseña para tu cuenta.';
      pwForm.hidden = false;
    } else {
      authSub.textContent = '';
      invalid.hidden = false;
    }
  }, 300);

  pwForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const p1 = document.getElementById('password').value;
    const p2 = document.getElementById('password2').value;
    pwMsg.textContent = ''; pwMsg.className = 'auth-msg';

    if (p1 !== p2) {
      pwMsg.textContent = 'Las contraseñas no coinciden.';
      pwMsg.className = 'auth-msg is-error';
      return;
    }

    const btn = document.getElementById('pwBtn');
    btn.disabled = true; btn.textContent = 'Guardando…';

    const { error } = await window.db.auth.updateUser({ password: p1 });

    if (error) {
      pwMsg.textContent = 'No se pudo guardar. Intenta de nuevo.';
      pwMsg.className = 'auth-msg is-error';
      btn.disabled = false; btn.textContent = 'Guardar y entrar';
      return;
    }
    location.href = 'index.html';
  });
})();
</script>
</body>
</html>
